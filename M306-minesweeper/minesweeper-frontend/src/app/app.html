<main class="page">
  <button class="new-game" type="button" (click)="newGame()">Neues Spiel</button>

  <p class="error" *ngIf="error">{{ error }}</p>

  <p *ngIf="!board">Drücke Neues Spiel, um zu starten.</p>

  <section *ngIf="board as b">
    <p>Status: {{ b.state }}</p>
    <p>Minen: {{ b.mineCount }}</p>

    <div class="board">
      <div class="row" *ngFor="let row of b.cells; let y = index">
        <button
          class="cell"
          *ngFor="let cell of row; let x = index"
          type="button"
          [class.revealed]="cell.revealed"
          [class.flagged]="cell.flagged && !cell.revealed"
          [class.mine]="cell.mine && cell.revealed"
          (pointerdown)="revealFromPointer($event, x, y)"
          (contextmenu)="flag($event, x, y)"
        >
          {{ text(cell) }}
        </button>
      </div>
    </div>
  </section>
</main>
