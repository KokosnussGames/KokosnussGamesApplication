server {
    listen 8080;
    server_name _;
    server_tokens off;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        application/javascript
        application/json
        application/xml
        image/svg+xml
        text/css
        text/plain
        text/xml;

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }

    location = /sudoku {
        return 301 /sudoku/;
    }

    location = /nonogram {
        return 301 /nonogram/;
    }

    location = /minesweeper {
        return 301 /minesweeper/;
    }

    location /sudoku/ {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /sudoku/index.html;
    }

    location /nonogram/ {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /nonogram/index.html;
    }

    location /minesweeper/ {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /minesweeper/index.html;
    }

    location ~* ^/(sudoku|nonogram|minesweeper)/.+\.(?:css|gif|ico|jpg|jpeg|js|png|svg|webp|woff2?)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location ~ ^/api/sudoku(?:/|$) {
        rewrite ^/api/sudoku/?(.*)$ /$1 break;
        proxy_pass http://sudoku-backend:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /api/sudoku;
    }

    location ~ ^/api/nonogram(?:/|$) {
        proxy_pass http://nonogram-backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/api/minesweeper(?:/|$) {
        proxy_pass http://minesweeper-backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
